server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth Service Routes
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - JwtAuthenticationFilter

        # User Service Routes
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthenticationFilter

        # Account Service Routes
        - id: account-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/accounts/**
          filters:
            - JwtAuthenticationFilter

        # Transaction Service Routes
        - id: transaction-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/transactions/**
          filters:
            - JwtAuthenticationFilter

        # Swagger Routes for Auth Service
        - id: auth-service-swagger
          uri: http://localhost:8081
          predicates:
            - Path=/auth-service/v3/api-docs/**

        # Swagger Routes for User Service
        - id: user-service-swagger
          uri: http://localhost:8082
          predicates:
            - Path=/user-service/v3/api-docs/**

        # Swagger Routes for Account Service
        - id: account-service-swagger
          uri: http://localhost:8083
          predicates:
            - Path=/account-service/v3/api-docs/**

        # Swagger Routes for Transaction Service
        - id: transaction-service-swagger
          uri: http://localhost:8084
          predicates:
            - Path=/transaction-service/v3/api-docs/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: bXlTdXBlclNlY3VyZUJhbmtpbmdBcHBsaWNhdGlvblNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjIwMjQ=

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.banking.gateway: DEBUG
